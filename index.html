<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data API</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1 { color: #1a1a2e; }
    pre {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
    }
    a { color: #0066cc; }
  </style>
</head>
<body>
  <h1>Data API</h1>
  <p>Esta página serve dados em formato JSON para uso em verificações e suporte.</p>
  <p>Acesse o JSON diretamente em: <a href="data.json">data.json</a></p>
  <h2>Exemplo de resposta</h2>
  <pre id="json-output">Carregando...</pre>
  <script>
    fetch('data.json')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);
      })
      .catch(function(err) {
        document.getElementById('json-output').textContent = 'Erro ao carregar dados: ' + err;
      });
  </script>
</body>
</html>
